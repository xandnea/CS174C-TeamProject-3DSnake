<!DOCTYPE html>
<html lang="en">
<head>
    <title>Snake 3D</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #111;
            overflow-x: hidden;
            overflow-y: auto; /* Enable the scrollbar */
        }

        /* Canvas (game): "Live Wallpaper" mode */
        canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: -1 !important; /* Sit BEHIND everything */
            display: block !important;
            object-fit: cover;
        }

        /* Score: always on top, never moves */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            pointer-events: none;
            padding: 20px;
        }

        #score-box {
            font-family: "Courier New", Courier, monospace;
            font-size: 32px; 
            font-weight: bold; 
            color: white; 
            /* text-shadow: 2px 2px 4px black; */
            border: 2px dashed rgb(255, 255, 255);
            border-top: 8px solid rgb(43, 255, 0);
            border-radius: 30px;
            /* border-width: 3px;
            border-radius: 30px;
            border-color: rgb(43, 255, 0);
            border-style: solid; */
            background-color: rgba(150, 150, 150, 0.5);
            display: inline-block;
            padding: 10px 20px;
            /* box-shadow: 0px -10px 10px rgb(255, 255, 255); */
        }

        @keyframes border-pulse {
            0% { border-color: rgb(255, 255, 255); transform: scale(1); }
            50% { box-shadow: 0 -10px 30px rgba(30, 255, 0, 0.607); border-color: rgb(61, 121, 250);; transform: scale(1.05); }
            100% { border-color: rgb(255, 255, 255);; transform: scale(1); }
        }

        .ui-pulse {
            animation: border-pulse 0.4s ease-out;
        }

        #controls-visualizer {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .key-layout {
            display: grid;
            gap: 20px;
        }

        #layout-4way {
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(2, 100px);
        }

        #layout-2way {
            grid-template-columns: repeat(2, 200px);
        }

        .key {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            font-weight: bold;
            font-size: 30px;
            transition: all 0.1s ease;
            backdrop-filter: blur(4px);
        }

        /* The "Pop" effect */
        .key.active {
            background: rgba(0, 255, 127, 0.3); /* Emerald glow */
            border-color: #00ff7f;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.6);
        }

        .spacer { background: none; border: none; backdrop-filter: none; }

        #game-over-screen {
            font-family: "Courier New", Courier, monospace;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
            display: none;
        }

        #final-score-text {
            font-size: 24px;
            margin: 20px 0;
        }

        #end-game-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        #restart-button, #quit-button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: rgb(43, 255, 0);
            color: black;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Spacer: for pushing the controls down */
        #game-viewport-area {
            height: 100vh;
            width: 100%;
            pointer-events: none; /* Let clicks pass through to the game */
        }

        /* Controls: slides up from the bottom */
        #main-section {
            position: relative;
            z-index: 10;
            background: #222; /* Solid color to hide the game when scrolling */
            color: white;
            min-height: 100vh;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        /* Clean up the engine's injected styles */
        .document-builder, .program-stuff {
            max-width: none !important;
            width: 100% !important;
            margin: 0 !important;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="score-box">
        SCORE: <span id="current-score">0</span><br>
        SPEED: <span id="current-speed">0</span>
    </div>

    <div id="controls-visualizer">
        <div id="layout-4way" class="key-layout">
            <div class="key spacer"></div>
            <div id="key-Up" class="key">⇧</div>
            <div class="key spacer"></div>
            <div id="key-Left" class="key">⇦</div>
            <div id="key-Down" class="key">⇩</div>
            <div id="key-Right" class="key">⇨</div>
        </div>

        <div id="layout-2way" class="key-layout" style="display: none;">
            <div id="key-Left-2" class="key">◀ LEFT</div>
            <div id="key-Right-2" class="key">RIGHT ▶</div>
        </div>
    </div>
</div>

<div id="game-over-screen">
    <h1 id="game-over-text">GAME OVER</h1>
    <p id="final-score-text">Your final score: <span id="final-score">0</span></p>
    <div id="end-game-buttons">
        <button id="restart-button" onclick="window.location.reload()">Restart Game</button>
        <button id="quit-button" onclick="window.close()">Quit</button>
    </div>
</div>

<div id="game-viewport-area"></div>

<div id="main-section" class="document-builder"></div>

<script type="module">
    const element_to_replace = document.querySelector("#main-section");
    import {main_scene, scene_selector, additional_scenes} from './main-scene.js';
    
    const root = new main_scene();
    root.animated_children.push(...additional_scenes.map(scene => new scene()));
    root.render_layout(element_to_replace);

    // Instead of forcing the width/height, ensure the CSS is locked to the window size.
    const lockStyle = () => {
        const canvas = document.querySelector("canvas");
        if (canvas) {
            canvas.style.width = "100vw";
            canvas.style.height = "100vh";
            canvas.style.position = "fixed";
        }
    };

    // Run a few times to make sure we win against the engine
    setInterval(lockStyle, 500);
</script>

</body>
</html>
